version: '3.8'

services:
  # Backend Spring Boot with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rpg-backend-dev
    ports:
      - "8080:8080"
      - "5005:5005"  # Remote debug port
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE:-rpg-characters}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-rpg-characters}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-this-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-client-secret}
      MAIL_HOST: ${MAIL_HOST:-smtp.resend.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-resend}
      MAIL_PASSWORD: ${RESEND_API_KEY:-your-api-key}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@rpgcharacters.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:delegated
      - ./backend/pom.xml:/app/pom.xml:delegated
      # Persist uploaded avatars
      - avatar-uploads:/app/uploads/avatars
      # Maven cache to avoid re-downloading dependencies
      - maven-cache:/root/.m2
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - rpg-network
    restart: unless-stopped

  # Frontend React with Hot Reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rpg-frontend-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api
      DOCKER_ENV: "true"
    volumes:
      # Mount source code for hot reload
      - ./frontend/src:/app/src:delegated
      - ./frontend/public:/app/public:delegated
      - ./frontend/index.html:/app/index.html:delegated
      - ./frontend/vite.config.ts:/app/vite.config.ts:delegated
      - ./frontend/tsconfig.json:/app/tsconfig.json:delegated
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json:delegated
      # Exclude node_modules from being mounted (use container's)
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - rpg-network
    restart: unless-stopped

networks:
  rpg-network:
    driver: bridge

volumes:
  maven-cache:
  avatar-uploads:
