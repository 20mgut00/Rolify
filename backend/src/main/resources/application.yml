spring:
  application:
    name: rpg-character-creator

  data:
    mongodb:
      # La URI se lee automáticamente desde la variable SPRING_DATA_MONGODB_URI
      database: ${MONGODB_DATABASE:rpg-characters}
  
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:your-api-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

app:
  upload:
    avatar-path: ${UPLOAD_AVATAR_PATH:./uploads/avatars}

  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
    expiration: 86400000 # 24 hours
    refresh-expiration: 604800000 # 7 days
  
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  
  email:
    from: ${EMAIL_FROM:noreply@rpgcharacters.com}
    verification:
      expiration: 3600000 # 1 hour

logging:
  level:
    root: INFO
    com.rpgcharacter: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.boot.context.config: DEBUG
    org.springframework.core.env: DEBUG
